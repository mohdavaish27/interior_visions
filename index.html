<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
        .main-div{
            background-color: rgb(62,81,114);
            color: rgb(255, 255, 255);
            max-width: 100%;
            height: 75px;
            border-radius: 10px;
            margin-top: 10px;
            overflow: hidden;



        }
        .main-div a{
            float: left;
            color: rgb(255, 255, 255);
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
            font-size: 17px;
            font-family: cursive;
            margin-top: 10px;
            margin-left: 2px;
        }
        body{
            background-color: rgba(249, 233, 222, 0.461);
            /* color: black; */
        }
        .main-div ul{
    list-style: none;
    display: flex;
    float: inline-start;
    justify-content: space-between;
    margin:0;
    padding: 0;
    
        }
        .main-div a:hover{
            background-color: rgb(159,182,195);
            font-style: normal;
            border-radius: 20px;
            color: black;


        }
        .main-div a.active{
            background-color: black;
            color: aliceblue;
        }
        .logo{
            width: 100px;
            margin-left: 85%;
            margin-top: 10px;
            
        }
        .logo img{
            max-width: 90px;
            height: 50px;
            
        }
  </style>
  <body>
    <div class="main-div">
      <!-- <ul>
        <li>HOME</li>
        <li>ABOUT</li>
        <li>SERVICES</li>
        <li>CONTACT</li> -->
        <a href="#ABOUT">HOME</a>
        <a href="#contact">CONTACT</a>
        <a href="#services">SERVICES</a>
        <a href="#about">ABOUT</a>
        <div class="logo">
            <img src="download.png" alt="hi">
        </div>
        </div>
      <!-- <h1>hi</h1> -->
    </div>
  </body>
</html>
